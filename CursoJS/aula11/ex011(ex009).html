<!DOCTYPE html>
<!-- ex009 -->
<!-- Thats a version in HTML of the exercise -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gentilics</title>
    <style>
        body{
            background-color: rgb(25, 167, 185);
        }
        input{
            background-color: rgb(69, 187, 202);
        }
        div#res {
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Nationality</h1>
    <label for="txtcountryname">
        Enter the country of birth: 
        <input type="text" name="txtcountryname" id="txtcountryname" placeholder="Enter the country of birth">
    </label>
    
    <input type="button" value="Verify" onclick="verify()">
    <div id="result">Gentilic...</div>

    <script>
        function verify() {
            let result = window.document.querySelector('div#result')
            let nacionality = window.document.querySelector('input#txtcountryname')

            result.innerHTML = `If the country of birth is <strong>${nacionality.value}</strong>...`

            // Thats a compound condition 
            if (nacionality.value != 'Brazil') {
                result.innerHTML += '<p>The individual is a <strong>foreigner</strong>!</p>'
            } else {
                result.innerHTML += '<p>The individual is a <strong>Brazilian</strong>!</p>'
            }
        }
    </script>
</body>
</html>
