<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Program</title>
    <style>
        body {
            background-color: rgb(65, 65, 145);
            color: white;
            font: normal 15pt Arial;
        }
        h1 {
            color: orange;
        }

        /* CSS Comment */

    </style>
</head>
<body>

    <!-- HTML Comment -->
    
    <h1>Olá, mundo!</h1>  
    <h6>Hello world!</h6>
    
    <!-- Will display the user's name -->
    <p></p>

    <script>
    
        /* JavaScript Comment */
        // This is a single line comment in JavaScript

        // Saving the user's name in a variable and displaying it using an alert
        let name = window.prompt('What is your name? \nUsing: (window.prompt)')
        window.alert('It is a pleasure to meet you ' + name + '!')

        // Displaying the user's name on the webpage using innerHTML and styling it with CSS properties
        let displayName = document.getElementsByTagName('p')
        displayName[0].innerHTML = `It's a pleasure to meet you  <strong> ${name} </strong>!`
        // Styling the displayed name with CSS properties dinamically using JavaScript
        displayName[0].style.borderRadius = '10px'
        displayName[0].style.backgroundColor = 'white'
        displayName[0].style.color = 'black'
        displayName[0].style.padding = '10px'
        displayName[0].style.width = 'fit-content'

    </script>
</body>
</html>
