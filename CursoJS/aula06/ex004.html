<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<acr>, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font: normal 28pt Arial;
        }
    </style>
</head>
<body>
 
    <script>
        
        let name = window.prompt('What is your name?')
        
        document.writeln(`Hello <strong>${name}</strong>! Your name has ${name.length} letters<br/>`)
        document.writeln(`Your name in uppercase is ${name.toUpperCase()}<br/>`)
        document.writeln('<hr/>') //horizontal line

        let number = Number(window.prompt('Enter a number: '))

        document.writeln(`The number you entered is ${number}<br/>`)
        document.writeln(`The number with two decimal places is ${number.toFixed(2)}<br/>`)
        /*number.toFixed(2).replace('.', ',') //replaces dot with comma */ 
        document.writeln(`The number formatted for Brazilian currency is ${number.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})}<br/>`)
    
    </script>

</body>
</html>
