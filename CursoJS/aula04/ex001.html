<html lang="pt-br">
<head>

        body {
            background-color: rgb(76, 76, 163);
            color: white;
            font: normal 15pt Times New Roman, serif;
        }
        h1 {
            color: orange;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <h6>Hello, world!</h6>
